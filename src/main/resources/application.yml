# ═════════════════════════════════════════════════════════════════════════════
# WhatsBotAI Core - Application Configuration
#
# Reads sensitive values from environment variables (see .env file).
# Profile-aware: 'dev' uses Neon Postgres, 'prod' will be configured later.
# ═════════════════════════════════════════════════════════════════════════════

spring:

  config:
    import:
      - optional:file:.env[.properties]

  application:
    name: whatsbotai-core

  # NOTA: 'profiles.active' foi REMOVIDO propositalmente.
  # O profile deve ser SEMPRE explícito via --spring.profiles.active=<profile>
  # Sem profile ativo, a aplicação NÃO sobe — proteção contra acidentes.

  # ─── Database Connection (driver only — URL/user/pass vêm dos profiles) ───
  datasource:
    driver-class-name: org.postgresql.Driver

  # ─── JPA / Hibernate (comportamento comum a todos os ambientes) ───────────
  jpa:
    hibernate:
      ddl-auto: validate

    open-in-view: false

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

        jdbc:
          "[time_zone]": UTC

  # ─── Flyway Migrations ─────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations:
      - classpath:db/migration

    baseline-on-migrate: true
    validate-on-migrate: true

  # ─── Web error handling ────────────────────────────────────────────────────
  web:
    error:
      include-message: always
      include-binding-errors: always

# ─── Server Configuration ────────────────────────────────────────────────────
server:
  port: 8080

# ─── Actuator (health, metrics, info endpoints) ──────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics

  endpoint:
    health:
      show-details: when-authorized

# ─── Logging (níveis base — profiles podem sobrescrever) ────────────────────
logging:
  level:
    root: INFO
    '[com.whatsbotai]': INFO
    '[org.flywaydb]': INFO