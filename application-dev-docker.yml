# ═════════════════════════════════════════════════════════════════════════════
# Profile: dev-docker
# Ambiente: Desenvolvimento local em casa, usando Postgres no Docker
# Ativação: ./gradlew bootRun --args='--spring.profiles.active=dev-docker'
# ═════════════════════════════════════════════════════════════════════════════

spring:

  # ─── Datasource (Postgres no Docker) ──────────────────────────────────────
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}

  hikari:
    datasource:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      pool-name: WhatsBotAI-DevDocker-Pool

  # ─── JPA (debug ligado pra desenvolvimento) ───────────────────────────────
    jpa:
      show-sql: true

      properties:
        hibernate:
          "[format_sql]": true

# ─── Logging (verbose pra dev) ───────────────────────────────────────────────
logging:
  level:
    '[com.whatsbotai]': DEBUG
    '[org.hibernate.SQL]': DEBUG
    '[org.hibernate.orm.jdbc.bind]': TRACE  # Mostra valores dos parâmetros SQL
